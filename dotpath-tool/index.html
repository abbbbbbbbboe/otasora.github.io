<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dotpath-tool</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header class="title">
        <h1>dotpath作成ツール</h1>
    </header>

    <section class="container">
        <div class="contents">
            <div class="construction">
                <p class="constructionText">工事中</p>
            </div>
            <div class="canvas">

            </div>

            <div class="uiPanel">
                
                <button class="dlButton">
                    downlaod!
                </button>
                <button class="clearButton">
                    clear!
                </button>
                <button class="backButton">
                    back!
                </button>

                <div class="inputPanel">
                    <div>
                        <label for="Pwidth">width</label>
                        <input type="number" name="Pwidth" id="width" min="0" max="700" width="100"/>
                    </div>
                    <div>
                        <label for="Pheight">height</label>
                        <input type="number" name="Pheight" id="height" min="0" max="500" width="100" />
                    </div>
                    <div>
                        <input type="number" id="width" min="0" max="700" width="100"/>
                    </div>
                    <div>
                        <input type="number" id="height" min="0" max="500" width="100" />
                    </div>
                    
                    
                </div>

                
                <button class="inputButton">
                    OK!
                </button>
                

            </div>
        </div>
    </section>

    <footer>
        <a href="/">back to top↩︎</a>
    </footer>

    <script src="main.js"></script>

</body>

</html>
